name: React Vite Build & Deploy to GitHub Pages

on:
    push:
        branches: [main]
    pull_request:
        branches: [main]

# Required for GitHub Pages deployment
permissions:
    contents: read
    pages: write
    id-token: write

# Only allow one deployment at a time
concurrency:
    group: pages
    cancel-in-progress: true

jobs:
  # ── 1. Lint & Type Check ───────────────────────────────────────────
  lint:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint
        run: npm run lint --if-present

      - name: TypeScript check
        run: npx tsc --noEmit --if-present

  # ── 2. Test ────────────────────────────────────────────────────────
  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test --if-present

  # ── 3. Build ───────────────────────────────────────────────────────
  build:
    name: Vite Build
    runs-on: ubuntu-latest
    needs: [lint, test]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
        env:
          # Vite needs the base path for GitHub Pages asset URLs
          # Use /your-repo-name/ or / if you have a custom domain
          VITE_BASE_URL: /your-repo-name/

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist/

  # ── 4. Deploy (main only) ──────────────────────────────────────────
  deploy:
    name: Deploy GitHub Pages
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@v4